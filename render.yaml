databases:
  - name: relai-db
    databaseName: relai
    user: relai
    plan: free

services:
  - type: web
    name: relai-api
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: relai-db
          property: connectionString
      - key: API_SECRET
        generateValue: true
      - key: API_PORT
        value: 3010
      - key: TASK_POLL_MS
        value: "15000"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ENABLE_MESSAGE_ROUTING
        value: "false"
